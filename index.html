<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Number Comparison</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #f0f8ff;
      }

      h1 {
        color: #333;
      }

      .num-btn {
        font-size: 24px;
        padding: 15px;
        margin: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: #4caf50;
        color: white;
      }

      .highlight {
        background: yellow;
        padding: 3px;
      }

      .win {
        color: red;
        font-weight: bold;
        animation: blink 0.6s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .step {
        margin: 10px;
        font-size: 20px;
      }

      .big {
        color: green;
        font-weight: bold;
        font-size: 28px;
      }
    </style>
  </head>

  <body>
    <h1>🎯 Learn to Compare Numbers</h1>

    <button onclick="generate()"><h1>Next Question</h1></button>

    <div id="numbers"></div>

    <div id="result"></div>
    <div id="explanation"></div>

    <script>
      let numbers = [];
      let correct = "";

      // 🔊 Speak function
      function speak(text) {
        return new Promise((resolve) => {
          speechSynthesis.cancel();
          let msg = new SpeechSynthesisUtterance(text);
          msg.rate = 0.85;

          msg.onend = resolve;
          speechSynthesis.speak(msg);
        });
      }

      // Generate numbers
      function generate() {
        numbers = [];
        document.getElementById("result").innerText = "";
        document.getElementById("explanation").innerHTML = "";

        for (let i = 0; i < 5; i++) {
          let digits = Math.floor(Math.random() * 4) + 2;
          let min = Math.pow(10, digits - 1);
          let max = Math.pow(10, digits) - 1;
          numbers.push(Math.floor(Math.random() * (max - min + 1)) + min);
        }

        correct = Math.max(...numbers).toString();

        let html = "";
        numbers.forEach((n) => {
          html += `<button class="num-btn" onclick="check('${n}')">${n}</button>`;
        });

        document.getElementById("numbers").innerHTML = html;

        speak("Select the biggest number");
      }

      // Check answer
      function check(ans) {
        if (ans === correct) {
          document.getElementById("result").innerText = "✅ Correct!";
          speak("Excellent! You are right!");
          document.getElementById("explanation").innerHTML = "";
        } else {
          document.getElementById("result").innerText =
            "❌ Wrong! Let me explain";
          explain();
        }
      }

      // Explanation
      async function explain() {
        let exp = document.getElementById("explanation");

        // STEP 1
        exp.innerHTML += "<div class='step'>Step 1: Count digits</div>";
        await speak("First, count the number of digits");

        for (let n of numbers) {
          exp.innerHTML += `<div class='step'>${n} has ${n.toString().length} digits</div>`;
          await speak(`${n} has ${n.toString().length} digits`);
        }

        let maxDigits = Math.max(...numbers.map((n) => n.toString().length));
        let candidates = numbers.filter(
          (n) => n.toString().length === maxDigits,
        );

        exp.innerHTML += `<div class='step'>Numbers with highest digits: ${candidates.join(", ")}</div>`;
        await speak("Numbers with highest digits are " + candidates.join(", "));

        if (candidates.length === 1) {
          exp.innerHTML += `<div class='big'>Biggest number is ${candidates[0]}</div>`;
          await speak("So the biggest number is " + candidates[0]);
          return;
        }

        // STEP 2
        exp.innerHTML += "<div class='step'>Step 2: Compare place values</div>";
        await speak("Now we compare place values");

        let maxLen = candidates[0].toString().length;

        for (let i = 0; i < maxLen; i++) {
          let digits = candidates.map((n) => Number(n.toString()[i]));
          let maxDigit = Math.max(...digits);

          exp.innerHTML += `<div class='step'>
        ${candidates
          .map((n) => {
            let str = n.toString();
            return str
              .split("")
              .map((d, idx) => {
                if (idx === i) {
                  if (Number(d) === maxDigit) {
                    return `<span class="win">${d}</span>`;
                  } else {
                    return `<span class="highlight">${d}</span>`;
                  }
                }
                return d;
              })
              .join("");
          })
          .join(" , ")}
        </div>`;

          await speak("Comparing next digit");

          let newCandidates = candidates.filter(
            (n) => Number(n.toString()[i]) === maxDigit,
          );

          if (newCandidates.length === 1) {
            exp.innerHTML += `<div class='big'>Biggest number is ${newCandidates[0]}</div>`;
            await speak("So the biggest number is " + newCandidates[0]);
            return;
          }

          candidates = newCandidates;
        }
      }

      // Init
      generate();
    </script>
  </body>
</html>
